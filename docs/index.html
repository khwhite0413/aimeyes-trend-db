<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIMEYES Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { inter: ['Inter', 'sans-serif'] },
          colors: {
            navy: { DEFAULT: '#1B2241', dark: '#151933', card: '#232847', border: '#2A305A' },
            brand: { red: '#FF4D40', blue: '#007AFF' },
          },
          transitionTimingFunction: {
            'smooth': 'cubic-bezier(0.4, 0, 0.2, 1)',
            'bounce': 'cubic-bezier(0.34, 1.56, 0.64, 1)',
            'ease-smooth': 'cubic-bezier(0.25, 0.1, 0.25, 1)',
          }
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { font-family: 'Inter', sans-serif; height: 100%; }
    html.dark body { background-color: #1B2241; }
    html:not(.dark) body { background-color: #F9FAFB; }
    *, *::before, *::after {
      transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  color 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  border-color 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                  fill 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  stroke 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .toggle-track { transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .toggle-thumb {
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .page-enter { animation: pageIn 0.45s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card-enter {
      opacity: 0; transform: translateY(16px);
      animation: cardIn 0.5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
    .tooltip-box {
      position: fixed; pointer-events: none; z-index: 9999;
      white-space: nowrap; min-width: 180px;
      animation: tooltipIn 0.18s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes tooltipIn {
      from { opacity: 0; transform: scale(0.92) translateY(4px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .donut-segment { transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
    .progress-fill { transition: width 0.8s cubic-bezier(0.25, 0.1, 0.25, 1); }
    .bar-animate {
      animation: barGrow 0.6s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
      transform-origin: bottom;
    }
    @keyframes barGrow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    .nav-item {
      transition: background-color 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                  color 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .treemap-block {
      transition: filter 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .treemap-block:hover { filter: brightness(1.1); transform: scale(1.02); z-index: 10; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #858A9C40; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── SVG Icons (Lucide style) ───
    const Icon = ({ name, size = 18, color = 'currentColor', className = '' }) => {
      const icons = {
        'play-circle': <><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></>,
        'trending-up': <><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></>,
        'twitter': <><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></>,
        'search': <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
        'pin': <><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></>,
        'hash': <><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></>,
        'eye': <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
        'sun': <><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></>,
        'moon': <><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></>,
        'activity': <><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></>,
        'refresh-cw': <><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></>,
        'check-circle': <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
        'clock': <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
        'alert-triangle': <><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
        'percent': <><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></>,
        'layers': <><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>,
        'film': <><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/></>,
      };
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
          stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
          className={className} style={{ flexShrink: 0 }}>
          {icons[name]}
        </svg>
      );
    };

    // ─── Data ───
    const PLATFORMS = [
      { name: 'YouTube', icon: 'play-circle', color: '#FF0000', count: 196, unit: 'videos collected' },
      { name: 'Google Trends', icon: 'trending-up', color: '#4285F4', count: 30, unit: 'keywords tracked' },
      { name: 'X (Twitter)', icon: 'twitter', color: '#1DA1F2', count: 170, unit: 'trending topics' },
      { name: 'Naver', icon: 'search', color: '#03CF5D', count: 50, unit: 'search trends' },
      { name: 'Pinterest', icon: 'pin', color: '#E60023', count: 25, unit: 'predictions' },
    ];

    const KEYWORDS_FREQ = [
      { label: '#패션트렌드', value: 32, count: 152, color: '#007AFF', platforms: 'YouTube, X, Naver' },
      { label: '#여름코디', value: 20, count: 95, color: '#34C759', platforms: 'YouTube, Naver' },
      { label: '#lookbook', value: 16, count: 76, color: '#FFD60A', platforms: 'YouTube, Pinterest' },
      { label: '#streetwear', value: 12, count: 57, color: '#AF52DE', platforms: 'X, YouTube' },
      { label: '#ootd 외', value: 20, count: 91, color: '#FF4D40', platforms: 'YouTube, X, Naver, Pinterest' },
    ];

    const KEYWORDS_VIEWS = [
      { label: '#패션트렌드', views: 1200000, viewsStr: '1.2M views', pct: 27.4, videos: 38, color: '#007AFF' },
      { label: '#여름코디', views: 820000, viewsStr: '820K', pct: 18.7, videos: 24, color: '#34C759' },
      { label: '#ootd', views: 680000, viewsStr: '680K', pct: 15.5, videos: 31, color: '#FF4D40' },
      { label: '#lookbook', views: 540000, viewsStr: '540K', pct: 12.3, videos: 18, color: '#FFD60A' },
      { label: '#minimal', views: 450000, viewsStr: '450K', pct: 10.3, videos: 15, color: '#FF9500' },
      { label: '#streetwear', views: 380000, viewsStr: '380K', pct: 8.7, videos: 12, color: '#AF52DE' },
      { label: '#viral', views: 290000, viewsStr: '290K', pct: 6.6, videos: 9, color: '#5AC8FA' },
      { label: '기타', views: 210000, viewsStr: '210K', pct: 4.8, videos: 7, color: '#636366' },
    ];

    const HISTORY = [
      { date: '3/11', success: 48, fail: 0 },
      { date: '3/12', success: 46, fail: 2 },
      { date: '3/13', success: 50, fail: 0 },
      { date: '3/14', success: 42, fail: 6 },
      { date: '3/15', success: 47, fail: 1 },
      { date: '3/16', success: 49, fail: 0 },
      { date: '3/17', success: 45, fail: 2 },
    ];

    const PLATFORM_RATES = [
      { name: 'YouTube', rate: 100, color: '#34C759' },
      { name: 'Google Trends', rate: 98, color: '#34C759' },
      { name: 'X (Twitter)', rate: 95, color: '#34C759' },
      { name: 'Naver', rate: 92, color: '#FFD60A' },
      { name: 'Pinterest', rate: 88, color: '#FF9500' },
    ];

    const ERRORS = [
      { platform: 'Pinterest', time: '3/14 09:01', msg: 'HTTP 429: Rate limit exceeded' },
      { platform: 'Naver', time: '3/12 23:02', msg: 'Timeout: Connection timed out (15s)' },
      { platform: 'X (Twitter)', time: '3/10 09:03', msg: 'HTTP 503: Service temporarily unavailable' },
    ];

    // ─── Toggle Switch ───
    function ToggleSwitch({ isDark, onToggle }) {
      return (
        <button onClick={onToggle}
          className="flex items-center gap-2 px-4 py-2 rounded-full border
            dark:bg-navy-card dark:border-navy-border bg-white border-gray-200
            cursor-pointer select-none">
          <Icon name="sun" size={15} color={!isDark ? '#007AFF' : '#858A9C'} />
          <div className="relative w-10 h-5 rounded-full toggle-track dark:bg-navy-border bg-gray-200">
            <div className={`absolute top-0.5 w-4 h-4 rounded-full toggle-thumb bg-brand-blue
              ${isDark ? 'translate-x-5' : 'translate-x-0.5'}`} />
          </div>
          <Icon name="moon" size={15} color={isDark ? '#007AFF' : '#858A9C'} />
        </button>
      );
    }

    // ─── Fixed Tooltip (Portal) ───
    function Tooltip({ visible, x, y, children }) {
      if (!visible) return null;
      return ReactDOM.createPortal(
        <div className="tooltip-box bg-black/90 text-white rounded-lg px-3.5 py-2.5 text-xs shadow-xl backdrop-blur-sm"
          style={{ left: x + 16, top: y - 16 }}>
          {children}
        </div>,
        document.body
      );
    }

    // ─── Donut Chart ───
    function DonutChart({ data, totalLabel }) {
      const [hovered, setHovered] = useState(null);
      const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
      const total = data.reduce((s, d) => s + d.value, 0);

      const handleMouseMove = useCallback((e) => {
        setMousePos({ x: e.clientX, y: e.clientY });
      }, []);

      let cumulative = 0;
      const segments = data.map((d) => {
        const start = cumulative;
        cumulative += (d.value / total) * 360;
        return { ...d, startAngle: start, sweepAngle: (d.value / total) * 360 };
      });

      function describeArc(cx, cy, r, startAngle, sweepAngle) {
        const rad = (a) => ((a - 90) * Math.PI) / 180;
        const x1 = cx + r * Math.cos(rad(startAngle));
        const y1 = cy + r * Math.sin(rad(startAngle));
        const x2 = cx + r * Math.cos(rad(startAngle + sweepAngle));
        const y2 = cy + r * Math.sin(rad(startAngle + sweepAngle));
        const large = sweepAngle > 180 ? 1 : 0;
        return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
      }

      return (
        <div className="relative" onMouseMove={handleMouseMove} onMouseLeave={() => setHovered(null)}>
          <svg width="180" height="180" viewBox="0 0 180 180">
            {segments.map((seg, i) => (
              <path key={i} d={describeArc(90, 90, 88, seg.startAngle, seg.sweepAngle)}
                fill={seg.color} className="donut-segment"
                style={{ opacity: hovered !== null && hovered !== i ? 0.4 : 1 }}
                onMouseEnter={() => setHovered(i)}
              />
            ))}
            <circle cx="90" cy="90" r="50" className="dark:fill-navy-card fill-white transition-colors duration-500" />
            <text x="90" y="85" textAnchor="middle" className="dark:fill-white fill-gray-900" style={{ fontSize: 28, fontWeight: 700 }}>
              {data.reduce((s, d) => s + (d.count || 0), 0)}
            </text>
            <text x="90" y="105" textAnchor="middle" className="dark:fill-gray-400 fill-gray-500" style={{ fontSize: 11 }}>
              {totalLabel}
            </text>
          </svg>
          <Tooltip visible={hovered !== null} x={mousePos.x} y={mousePos.y}>
            {hovered !== null && (<>
              <div className="font-semibold text-[13px] mb-1.5">{data[hovered].label}</div>
              <div className="flex items-center gap-2 text-white/80 mb-0.5">
                <Icon name="hash" size={11} color="#858A9C" /> 사용 횟수: {data[hovered].count}회
              </div>
              <div className="flex items-center gap-2 text-white/80 mb-0.5">
                <Icon name="percent" size={11} color="#858A9C" /> 비율: {data[hovered].value}%
              </div>
              <div className="flex items-center gap-2 text-white/80">
                <Icon name="layers" size={11} color="#858A9C" /> 플랫폼: {data[hovered].platforms}
              </div>
            </>)}
          </Tooltip>
        </div>
      );
    }

    // ─── Treemap ───
    function Treemap({ data }) {
      const [hovered, setHovered] = useState(null);
      const [mousePos, setMousePos] = useState({ x: 0, y: 0 });

      const handleMouseMove = useCallback((e) => {
        setMousePos({ x: e.clientX, y: e.clientY });
      }, []);

      const layout = [
        { x: 0, y: 0, w: 48.8, h: 57.7 },
        { x: 48.8, y: 0, w: 28.8, h: 57.7 },
        { x: 0, y: 57.7, w: 35.5, h: 42.3 },
        { x: 77.6, y: 0, w: 22.4, h: 33.8 },
        { x: 35.5, y: 57.7, w: 31, h: 42.3 },
        { x: 77.6, y: 33.8, w: 22.4, h: 23.8 },
        { x: 66.5, y: 57.7, w: 17.7, h: 42.3 },
        { x: 84.2, y: 57.7, w: 15.8, h: 42.3 },
      ];

      return (
        <div className="relative w-full h-[260px] rounded-lg overflow-hidden"
          onMouseMove={handleMouseMove} onMouseLeave={() => setHovered(null)}>
          {data.map((item, i) => (
            <div key={i}
              className="treemap-block absolute p-2.5 cursor-pointer overflow-hidden"
              style={{
                left: `${layout[i].x}%`, top: `${layout[i].y}%`,
                width: `${layout[i].w}%`, height: `${layout[i].h}%`,
                backgroundColor: item.color,
              }}
              onMouseEnter={() => setHovered(i)}
            >
              <div className="text-white font-semibold text-[12px] leading-tight">{item.label}</div>
              <div className="text-white/70 text-[10px] mt-0.5">{item.viewsStr}</div>
            </div>
          ))}
          <Tooltip visible={hovered !== null} x={mousePos.x} y={mousePos.y}>
            {hovered !== null && (<>
              <div className="font-semibold text-[13px] mb-1.5">{data[hovered].label}</div>
              <div className="flex items-center gap-2 text-white/80 mb-0.5">
                <Icon name="eye" size={11} color="#858A9C" /> 총 조회수: {data[hovered].views.toLocaleString()}
              </div>
              <div className="flex items-center gap-2 text-white/80 mb-0.5">
                <Icon name="film" size={11} color="#858A9C" /> 영상 수: {data[hovered].videos}개
              </div>
              <div className="flex items-center gap-2 text-white/80">
                <Icon name="percent" size={11} color="#858A9C" /> 비율: {data[hovered].pct}%
              </div>
            </>)}
          </Tooltip>
        </div>
      );
    }

    // ─── Bar Chart ───
    function BarChart({ data }) {
      const maxVal = Math.max(...data.map(d => d.success + d.fail));
      return (
        <div className="flex-1 flex flex-col">
          <div className="flex-1 flex items-end gap-3 px-2">
            {data.map((d, i) => (
              <div key={i} className="flex-1 flex flex-col items-center gap-1">
                <div className="w-full flex flex-col" style={{ height: 280 }}>
                  <div className="flex-1" />
                  <div className="bar-animate rounded-t-md bg-green-500 w-full"
                    style={{ height: `${(d.success / maxVal) * 100}%`, animationDelay: `${i * 0.08}s` }} />
                  {d.fail > 0 && (
                    <div className="bar-animate bg-brand-red w-full"
                      style={{ height: `${(d.fail / maxVal) * 100}%`, animationDelay: `${i * 0.08 + 0.1}s` }} />
                  )}
                </div>
                <span className="text-[11px] dark:text-gray-400 text-gray-500 mt-1">{d.date}</span>
              </div>
            ))}
          </div>
          <div className="flex items-center gap-4 mt-4 justify-end">
            <div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-sm bg-green-500" /><span className="text-[11px] dark:text-gray-400 text-gray-500">성공</span></div>
            <div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-sm bg-brand-red" /><span className="text-[11px] dark:text-gray-400 text-gray-500">실패</span></div>
          </div>
        </div>
      );
    }

    // ─── Platform Card ───
    function PlatformCard({ platform, index }) {
      return (
        <div className="card-enter flex-1 dark:bg-navy-card bg-white rounded-xl p-5
          dark:border-navy-border border-gray-200 border"
          style={{ animationDelay: `${index * 0.08}s` }}>
          <div className="flex items-center gap-2.5 mb-3">
            <Icon name={platform.icon} size={20} color={platform.color} />
            <span className="text-sm font-semibold dark:text-white text-gray-900">{platform.name}</span>
          </div>
          <div className="text-[32px] font-bold dark:text-white text-gray-900 leading-none">{platform.count}</div>
          <div className="text-xs dark:text-gray-400 text-gray-500 mt-1">{platform.unit}</div>
          <div className="flex items-center gap-1.5 mt-3">
            <div className="w-2 h-2 rounded-full bg-green-500" />
            <span className="text-xs font-medium text-green-500">Active</span>
          </div>
        </div>
      );
    }

    // ─── Trend Overview Tab ───
    function TrendOverview() {
      const [chartTab, setChartTab] = useState('freq');
      return (
        <div className="page-enter flex flex-col gap-6 flex-1">
          <div className="flex gap-4">
            {PLATFORMS.map((p, i) => <PlatformCard key={p.name} platform={p} index={i} />)}
          </div>
          <div className="flex gap-4 flex-1 min-h-0">
            <div className="flex-1 dark:bg-navy-card bg-white rounded-xl p-6
              dark:border-navy-border border-gray-200 border flex flex-col gap-4">
              <div className="flex items-center justify-between">
                <span className="text-lg font-semibold dark:text-white text-gray-900">Trending Keywords</span>
                <span className="text-[11px] font-semibold text-white bg-brand-blue rounded-full px-3 py-1">Live</span>
              </div>
              <div className="flex dark:bg-navy bg-gray-100 rounded-lg p-0.5">
                <button onClick={() => setChartTab('freq')}
                  className={`flex items-center gap-1.5 px-4 py-1.5 rounded-lg text-xs font-medium transition-all duration-300 ease-smooth
                    ${chartTab === 'freq' ? 'bg-brand-blue text-white shadow-md' : 'dark:text-gray-400 text-gray-500'}`}>
                  <Icon name="hash" size={13} color={chartTab === 'freq' ? '#fff' : '#858A9C'} /> 키워드 빈도
                </button>
                <button onClick={() => setChartTab('views')}
                  className={`flex items-center gap-1.5 px-4 py-1.5 rounded-lg text-xs font-medium transition-all duration-300 ease-smooth
                    ${chartTab === 'views' ? 'bg-brand-blue text-white shadow-md' : 'dark:text-gray-400 text-gray-500'}`}>
                  <Icon name="eye" size={13} color={chartTab === 'views' ? '#fff' : '#858A9C'} /> YouTube 조회수
                </button>
              </div>
              <div className="flex-1 flex items-center">
                {chartTab === 'freq' ? (
                  <div className="page-enter flex items-center gap-8 w-full" key="freq">
                    <DonutChart data={KEYWORDS_FREQ} totalLabel="total" />
                    <div className="flex-1 flex flex-col gap-3.5">
                      {KEYWORDS_FREQ.map((kw, i) => (
                        <div key={i} className="flex items-center gap-2.5">
                          <div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ backgroundColor: kw.color }} />
                          <span className="flex-1 text-[13px] dark:text-white text-gray-900">{kw.label}</span>
                          <span className="text-[13px] font-semibold dark:text-gray-300 text-gray-600">{kw.value}%</span>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : (
                  <div className="page-enter w-full" key="views">
                    <Treemap data={KEYWORDS_VIEWS} />
                  </div>
                )}
              </div>
            </div>
            <div className="w-[340px] dark:bg-navy-card bg-white rounded-xl p-6
              dark:border-navy-border border-gray-200 border flex flex-col gap-4">
              <span className="text-lg font-semibold dark:text-white text-gray-900">Recent Collections</span>
              <div className="flex dark:border-b-navy-border border-b-gray-200 border-b pb-2">
                <span className="flex-1 text-xs font-semibold dark:text-gray-400 text-gray-500">Platform</span>
                <span className="w-14 text-xs font-semibold dark:text-gray-400 text-gray-500">Items</span>
                <span className="w-16 text-xs font-semibold dark:text-gray-400 text-gray-500 text-right">Time</span>
              </div>
              {PLATFORMS.map((p, i) => (
                <div key={i} className="flex items-center py-1">
                  <span className="flex-1 text-[13px] dark:text-white text-gray-900">{p.name}</span>
                  <span className="w-14 text-[13px] font-semibold text-brand-blue">{p.count}</span>
                  <span className="w-16 text-[13px] dark:text-gray-400 text-gray-500 text-right">09:00</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─── Monitoring Tab ───
    function Monitoring() {
      const stats = [
        { icon: 'refresh-cw', label: '총 수집 횟수', value: '348', sub: '최근 30일', color: 'dark:text-white text-gray-900', iconColor: '#858A9C' },
        { icon: 'check-circle', label: '성공률', value: '96.8%', sub: '337 / 348 성공', color: 'text-green-500', iconColor: '#34C759' },
        { icon: 'clock', label: '마지막 수집', value: '09:02', sub: '2026-03-17 KST', color: 'dark:text-white text-gray-900', iconColor: '#858A9C' },
        { icon: 'alert-triangle', label: '에러 발생', value: '11', sub: '최근 30일', color: 'text-orange-500', iconColor: '#FF9500' },
      ];
      return (
        <div className="page-enter flex flex-col gap-6 flex-1">
          <div className="flex gap-4">
            {stats.map((s, i) => (
              <div key={i} className="card-enter flex-1 dark:bg-navy-card bg-white rounded-xl p-5
                dark:border-navy-border border-gray-200 border"
                style={{ animationDelay: `${i * 0.08}s` }}>
                <div className="flex items-center gap-2 mb-2">
                  <Icon name={s.icon} size={16} color={s.iconColor} />
                  <span className="text-xs dark:text-gray-400 text-gray-500">{s.label}</span>
                </div>
                <div className={`text-[28px] font-bold leading-none ${s.color}`}>{s.value}</div>
                <div className="text-[11px] dark:text-gray-400 text-gray-500 mt-1">{s.sub}</div>
              </div>
            ))}
          </div>
          <div className="flex gap-4 flex-1 min-h-0">
            <div className="flex-1 dark:bg-navy-card bg-white rounded-xl p-6
              dark:border-navy-border border-gray-200 border flex flex-col gap-4">
              <div className="flex items-center justify-between">
                <span className="text-base font-semibold dark:text-white text-gray-900">수집 히스토리 (7일)</span>
                <span className="text-[11px] font-semibold text-green-500 bg-green-500/10 rounded-full px-3 py-1">정상</span>
              </div>
              <BarChart data={HISTORY} />
            </div>
            <div className="w-[380px] dark:bg-navy-card bg-white rounded-xl p-5
              dark:border-navy-border border-gray-200 border flex flex-col gap-3 overflow-auto">
              <span className="text-base font-semibold dark:text-white text-gray-900">플랫폼별 성공률</span>
              <div className="dark:border-b-navy-border border-b-gray-200 border-b" />
              {PLATFORM_RATES.map((p, i) => (
                <div key={i} className="flex flex-col gap-1.5">
                  <div className="flex justify-between">
                    <span className="text-[13px] dark:text-white text-gray-900">{p.name}</span>
                    <span className="text-[13px] font-semibold" style={{ color: p.color }}>{p.rate}%</span>
                  </div>
                  <div className="w-full h-1.5 rounded-full dark:bg-navy-border bg-gray-200">
                    <div className="progress-fill h-full rounded-full" style={{ width: `${p.rate}%`, backgroundColor: p.color }} />
                  </div>
                </div>
              ))}
              <div className="dark:border-b-navy-border border-b-gray-200 border-b mt-1" />
              <span className="text-sm font-semibold dark:text-white text-gray-900">최근 에러</span>
              {ERRORS.map((err, i) => (
                <div key={i} className="flex flex-col gap-1 rounded-lg bg-red-500/10 p-2.5">
                  <div className="flex justify-between">
                    <span className="text-xs font-semibold text-brand-red">{err.platform}</span>
                    <span className="text-[11px] dark:text-gray-400 text-gray-500">{err.time}</span>
                  </div>
                  <span className="text-[11px] dark:text-gray-300 text-gray-600">{err.msg}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─── App ───
    function App() {
      const [isDark, setIsDark] = useState(true);
      const [activeTab, setActiveTab] = useState('trend');

      useEffect(() => {
        document.documentElement.classList.toggle('dark', isDark);
      }, [isDark]);

      const tabs = [
        { id: 'trend', label: '트렌드 현황', icon: 'trending-up' },
        { id: 'monitor', label: '수집 모니터링', icon: 'activity' },
      ];

      const today = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });

      return (
        <div className="flex h-screen dark:bg-navy bg-gray-50 font-inter overflow-hidden max-w-[1440px] mx-auto">
          {/* Sidebar */}
          <div className="w-60 flex-shrink-0 dark:bg-navy-dark bg-white flex flex-col
            dark:border-r-navy-border border-r-gray-200 border-r p-5 gap-2">
            <div className="flex items-center gap-2.5 pb-4">
              <div className="w-8 h-8 rounded-lg bg-brand-red flex items-center justify-center">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/>
                </svg>
              </div>
              <span className="text-lg font-bold dark:text-white text-gray-900 tracking-tight">AIMEYES</span>
            </div>
            <div className="h-px dark:bg-navy-border bg-gray-200" />
            <div className="mt-2 flex flex-col gap-1">
              <span className="text-[11px] font-semibold dark:text-gray-400 text-gray-500 tracking-wider px-3 mb-1">MENU</span>
              {tabs.map(tab => (
                <button key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`nav-item flex items-center gap-2.5 px-3 py-2.5 rounded-lg w-full text-left text-sm
                    ${activeTab === tab.id
                      ? 'bg-brand-blue text-white font-medium'
                      : 'dark:text-gray-300 text-gray-600 dark:hover:bg-navy-card hover:bg-gray-100'}`}>
                  <Icon name={tab.icon} size={18} color={activeTab === tab.id ? '#fff' : '#858A9C'} />
                  {tab.label}
                </button>
              ))}
            </div>
          </div>

          {/* Main Content */}
          <div className="flex-1 flex flex-col p-8 overflow-auto min-w-0">
            <div className="flex items-center justify-between mb-6">
              <div>
                <h1 className="text-[28px] font-bold dark:text-white text-gray-900 tracking-tight">
                  {activeTab === 'trend' ? '트렌드 현황' : '수집 모니터링'}
                </h1>
                <p className="text-[13px] dark:text-gray-400 text-gray-500 mt-1">
                  {activeTab === 'trend'
                    ? `${today} 기준 · 5개 플랫폼 수집 중`
                    : 'GitHub Actions · 하루 2회 자동 수집 (09:00 / 23:00 KST)'}
                </p>
              </div>
              <ToggleSwitch isDark={isDark} onToggle={() => setIsDark(!isDark)} />
            </div>
            {activeTab === 'trend' ? <TrendOverview key="trend" /> : <Monitoring key="monitor" />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
