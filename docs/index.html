<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIMEYES Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23FF4D40'/><path d='M16 6L8 12l8 6 8-6-8-6z' fill='none' stroke='white' stroke-width='2.5' stroke-linejoin='round'/><path d='M8 20l8 6 8-6' fill='none' stroke='white' stroke-width='2.5' stroke-linejoin='round'/></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { inter: ['Inter', 'sans-serif'] },
          colors: {
            navy: { DEFAULT: '#1B2241', dark: '#151933', card: '#232847', border: '#2A305A' },
            brand: { red: '#FF4D40', blue: '#007AFF' },
          },
          transitionTimingFunction: {
            'smooth': 'cubic-bezier(0.4, 0, 0.2, 1)',
            'bounce': 'cubic-bezier(0.34, 1.56, 0.64, 1)',
            'ease-smooth': 'cubic-bezier(0.25, 0.1, 0.25, 1)',
          }
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { font-family: 'Inter', sans-serif; height: 100%; }
    html.dark body { background-color: #1B2241; }
    html:not(.dark) body { background-color: #F9FAFB; }
    *, *::before, *::after {
      transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  color 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  border-color 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                  fill 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  stroke 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .toggle-track { transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .toggle-thumb {
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .page-enter { animation: pageIn 0.45s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card-enter {
      opacity: 0; transform: translateY(16px);
      animation: cardIn 0.5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
    .tooltip-box {
      position: fixed; pointer-events: none; z-index: 9999;
      white-space: nowrap; min-width: 180px;
      animation: tooltipIn 0.18s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes tooltipIn {
      from { opacity: 0; transform: scale(0.92) translateY(4px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .donut-segment { transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
    .progress-fill { transition: width 0.8s cubic-bezier(0.25, 0.1, 0.25, 1); }
    .bar-animate {
      animation: barGrow 0.6s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
      transform-origin: bottom;
    }
    @keyframes barGrow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    .nav-item {
      transition: background-color 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                  color 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .treemap-block {
      transition: filter 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .treemap-block:hover { filter: brightness(1.1); transform: scale(1.02); z-index: 10; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #858A9C40; border-radius: 3px; }
    .loading-spinner {
      border: 3px solid rgba(0,122,255,0.2);
      border-top: 3px solid #007AFF;
      border-radius: 50%;
      width: 32px; height: 32px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .country-tab {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer; user-select: none;
    }
    .country-tab:hover { opacity: 0.85; }
    .platform-card-clickable {
      cursor: pointer;
      transition: border-color 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .platform-card-clickable:hover { opacity: 0.92; }
    .platform-card-active {
      border-color: #007AFF !important;
      box-shadow: 0 0 12px rgba(0, 122, 255, 0.35);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ─── SVG Icons (Lucide style) ───
    const Icon = ({ name, size = 18, color = 'currentColor', className = '' }) => {
      const icons = {
        'play-circle': <><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></>,
        'trending-up': <><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></>,
        'twitter': <><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></>,
        'search': <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
        'pin': <><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></>,
        'hash': <><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></>,
        'eye': <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
        'sun': <><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></>,
        'moon': <><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></>,
        'activity': <><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></>,
        'refresh-cw': <><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></>,
        'check-circle': <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
        'clock': <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
        'alert-triangle': <><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
        'percent': <><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></>,
        'layers': <><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>,
        'film': <><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/></>,
      };
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
          stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
          className={className} style={{ flexShrink: 0 }}>
          {icons[name]}
        </svg>
      );
    };

    // ─── Constants ───
    const PLATFORM_DEFS = [
      { key: 'youtube', name: 'YouTube', icon: 'play-circle', color: '#FF0000', unit: 'videos collected' },
      { key: 'google_trends', name: 'Google Trends', icon: 'trending-up', color: '#4285F4', unit: 'keywords tracked' },
      { key: 'x_twitter', name: 'X (Twitter)', icon: 'twitter', color: '#1DA1F2', unit: 'trending topics' },
      { key: 'naver', name: 'Naver', icon: 'search', color: '#03CF5D', unit: 'search trends' },
      { key: 'pinterest', name: 'Pinterest', icon: 'pin', color: '#E60023', unit: 'predictions' },
    ];

    const COUNTRY_TABS = [
      { id: 'KR', label: 'KR', labelFull: '한국', flags: [{ src: 'https://flagcdn.com/w80/kr.png', alt: 'KR' }] },
      { id: 'NA', label: 'NA', labelFull: '북미', flags: [
        { src: 'https://flagcdn.com/w80/us.png', alt: 'US', zIndex: 1, offset: 0 },
        { src: 'https://flagcdn.com/w80/ca.png', alt: 'CA', zIndex: 2, offset: 10 },
      ]},
      { id: 'JP', label: 'JP', labelFull: '일본', flags: [{ src: 'https://flagcdn.com/w80/jp.png', alt: 'JP' }] },
      { id: 'CN', label: 'CN', labelFull: '중국', flags: [{ src: 'https://flagcdn.com/w80/cn.png', alt: 'CN' }] },
    ];

    // Map country tab to data keys
    const COUNTRY_YT_KEY = { KR: 'KR', NA: 'US', JP: 'JP', CN: 'CN' };
    const COUNTRY_GT_KEY = { KR: 'KR', NA: 'US', JP: 'JP', CN: 'CN' };
    const COUNTRY_XT_KEY = { KR: 'korea', NA: 'united-states', JP: 'japan', CN: 'china' };

    // Platform-specific second tab config
    const PLATFORM_SECOND_TAB = {
      youtube: { id: 'views', label: 'YouTube 조회수', icon: 'eye' },
      google_trends: { id: 'interest', label: '검색 관심도', icon: 'trending-up' },
      x_twitter: { id: 'topics', label: '트렌딩 토픽', icon: 'twitter' },
      naver: { id: 'rankings', label: '검색 순위', icon: 'search' },
      pinterest: { id: 'predictions', label: '트렌드 예측', icon: 'pin' },
    };

    // ─── Data Fetching Layer ───
    const DATA_BASE = 'https://raw.githubusercontent.com/khwhite0413/aimeyes-trend-db/master/data/';

    function getRecentDates(count = 7) {
      const dates = [];
      const today = new Date();
      for (let i = 0; i < count; i++) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        dates.push(d.toISOString().split('T')[0]);
      }
      return dates;
    }

    async function fetchJSON(url) {
      const resp = await fetch(url);
      if (!resp.ok) return null;
      return resp.json();
    }

    async function loadAllData() {
      const dates = getRecentDates(14);
      const discovered = [];

      const metaPromises = dates.map(async (date) => {
        const [fashionMeta, generalMeta] = await Promise.all([
          fetchJSON(`${DATA_BASE}fashion/${date}/_meta.json`),
          fetchJSON(`${DATA_BASE}general/${date}/_meta.json`),
        ]);
        if (fashionMeta || generalMeta) {
          return { date, fashionMeta, generalMeta };
        }
        return null;
      });

      const metaResults = (await Promise.all(metaPromises)).filter(Boolean);
      metaResults.sort((a, b) => b.date.localeCompare(a.date));

      if (metaResults.length === 0) return null;

      const latestDate = metaResults[0].date;

      const [youtube, googleTrends, xTwitter, naver, pinterest,
             youtubeGen, googleTrendsGen, xTwitterGen, naverGen, pinterestGen] = await Promise.all([
        fetchJSON(`${DATA_BASE}fashion/${latestDate}/youtube.json`),
        fetchJSON(`${DATA_BASE}fashion/${latestDate}/google_trends.json`),
        fetchJSON(`${DATA_BASE}fashion/${latestDate}/x_twitter.json`),
        fetchJSON(`${DATA_BASE}fashion/${latestDate}/naver.json`),
        fetchJSON(`${DATA_BASE}fashion/${latestDate}/pinterest.json`),
        fetchJSON(`${DATA_BASE}general/${latestDate}/youtube.json`),
        fetchJSON(`${DATA_BASE}general/${latestDate}/google_trends.json`),
        fetchJSON(`${DATA_BASE}general/${latestDate}/x_twitter.json`),
        fetchJSON(`${DATA_BASE}general/${latestDate}/naver.json`),
        fetchJSON(`${DATA_BASE}general/${latestDate}/pinterest.json`),
      ]);

      return {
        metaResults,
        latestDate,
        latestFashionMeta: metaResults[0].fashionMeta,
        latestGeneralMeta: metaResults[0].generalMeta,
        fashion: { youtube, googleTrends, xTwitter, naver, pinterest },
        general: { youtube: youtubeGen, googleTrends: googleTrendsGen, xTwitter: xTwitterGen, naver: naverGen, pinterest: pinterestGen },
      };
    }

    // ─── AM/PM Time Formatting ───
    function formatTimeAMPM(hour, minute) {
      const h = parseInt(hour);
      const m = String(minute).padStart(2, '0');
      if (h === 0) return `12:${m} AM`;
      if (h < 12) return `${h}:${m} AM`;
      if (h === 12) return `12:${m} PM`;
      return `${h - 12}:${m} PM`;
    }

    // ─── Data Processing ───
    function buildPlatforms(fashionMeta, generalMeta) {
      return PLATFORM_DEFS.map(def => {
        const fItems = fashionMeta?.results?.[def.key]?.items || 0;
        const gItems = generalMeta?.results?.[def.key]?.items || 0;
        const fStatus = fashionMeta?.results?.[def.key]?.status || 'unknown';
        const gStatus = generalMeta?.results?.[def.key]?.status || 'unknown';
        const active = fStatus === 'success' || gStatus === 'success';
        return { ...def, count: fItems + gItems, active };
      });
    }

    function buildRecentCollections(fashionMeta, generalMeta) {
      const timestamp = fashionMeta?.run_timestamp || generalMeta?.run_timestamp || '';
      let timeStr = '--:--';
      if (timestamp) {
        const d = new Date(timestamp);
        const kstHour = d.getUTCHours() + 9;
        const hour = kstHour >= 24 ? kstHour - 24 : kstHour;
        const mins = d.getUTCMinutes();
        timeStr = formatTimeAMPM(hour, mins);
      }

      return PLATFORM_DEFS.map(def => {
        const fItems = fashionMeta?.results?.[def.key]?.items || 0;
        const gItems = generalMeta?.results?.[def.key]?.items || 0;
        return { name: def.name, count: fItems + gItems, time: timeStr };
      });
    }

    // ─── Stop words set ───
    const STOP_WORDS = new Set(['the','a','an','and','or','is','in','at','to','for','of','on','it',
      'my','me','i','you','he','she','we','they','this','that','with','from','by','as','be',
      'was','are','were','been','do','does','did','have','has','had','will','would','could',
      'should','may','might','can','shall','its','his','her','our','your','their','not','no',
      'but','if','than','then','so','up','out','about','into','over','after','before','all',
      'just','also','how','what','when','where','which','who','why','very','only','now','new',
      'one','two','more','some','any','each','every','much','many','most','other','been','being',
      '|','-','&','the','de','la','le','les','des','du','et','en','un','une','au','que','qui',
      'est','sur','pas','pour','ce','il','se','ne','son','sa','ses','ou','mais','comme','tout',
      'plus','avec','dans','par','nous','vous','ils','elle','on','dit','fait','va','bien','m\u00eame',
      'encore','l\u00e0','peu','trop','tr\u00e8s','rien','car','donc','ni','sans','vers','chez','apr\u00e8s',
      '','–','—','...','「','」','【','】','『','』','(',')','[',']']);

    // ─── Keyword Extraction per Platform per Country ───
    function extractKeywordsForPlatform(platformKey, country, fashionData, generalData) {
      const freq = {};
      const colors = ['#007AFF', '#34C759', '#FFD60A', '#AF52DE', '#FF4D40'];

      if (platformKey === 'youtube') {
        // Use _search results only for keyword extraction
        const titles = [];
        const collectTitles = (ytData) => {
          if (!ytData?.regions) return;
          const cc = COUNTRY_YT_KEY[country];
          const searchKey = `${cc}_search`;
          const regionData = ytData.regions[searchKey];
          if (Array.isArray(regionData)) {
            for (const video of regionData) {
              if (video.title) titles.push(video.title);
            }
          }
        };
        collectTitles(fashionData?.youtube);
        collectTitles(generalData?.youtube);

        for (const title of titles) {
          const hashtags = title.match(/#[^\s#]+/g) || [];
          for (const tag of hashtags) {
            const normalized = tag.toLowerCase();
            if (normalized.length > 2) freq[normalized] = (freq[normalized] || 0) + 1;
          }
          const words = title.replace(/[^\w\s가-힣ぁ-ヿ㐀-䶵一-鿋豈-頻々〇〻\u3400-\u9FFF#]/g, ' ').split(/\s+/);
          for (const w of words) {
            if (w.startsWith('#')) continue;
            const lower = w.toLowerCase();
            if (lower.length >= 3 && !STOP_WORDS.has(lower) && !/^\d+$/.test(lower)) {
              freq[lower] = (freq[lower] || 0) + 1;
            }
          }
        }
      } else if (platformKey === 'google_trends') {
        const cc = COUNTRY_GT_KEY[country];
        const collectGT = (gtData) => {
          if (!gtData?.countries?.[cc]) return;
          const countryData = gtData.countries[cc];
          const trends = countryData.all_trending || countryData.trending_fashion || [];
          for (const t of trends) {
            if (t.keyword) {
              const k = t.keyword.toLowerCase();
              freq[k] = (freq[k] || 0) + 1;
            }
          }
        };
        collectGT(fashionData?.googleTrends);
        collectGT(generalData?.googleTrends);
      } else if (platformKey === 'x_twitter') {
        const xtKey = COUNTRY_XT_KEY[country];
        const collectXT = (xtData) => {
          if (!xtData?.countries?.[xtKey]) return;
          const countryData = xtData.countries[xtKey];
          const topics = countryData.all_trending || countryData.fashion_related || [];
          for (const t of topics) {
            if (t.topic) {
              const k = t.topic.length > 25 ? t.topic.substring(0, 25) : t.topic;
              freq[k] = (freq[k] || 0) + 1;
            }
          }
        };
        collectXT(fashionData?.xTwitter);
        collectXT(generalData?.xTwitter);
      } else if (platformKey === 'naver') {
        if (country !== 'KR') return [];
        const collectNaver = (naverData) => {
          if (!naverData?.daily_rankings) return;
          for (const day of naverData.daily_rankings) {
            for (const kw of (day.keywords || [])) {
              if (kw.keyword) {
                freq[kw.keyword] = (freq[kw.keyword] || 0) + 1;
              }
            }
          }
        };
        collectNaver(fashionData?.naver);
        collectNaver(generalData?.naver);
      } else if (platformKey === 'pinterest') {
        const collectPinterest = (pData) => {
          if (!pData?.trends) return;
          for (const t of pData.trends) {
            if (t.name) {
              freq[t.name] = (freq[t.name] || 0) + 1;
            }
          }
        };
        collectPinterest(fashionData?.pinterest);
        collectPinterest(generalData?.pinterest);
      }

      const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 5);
      const totalCount = sorted.reduce((s, [, c]) => s + c, 0);

      return sorted.map(([label, count], i) => ({
        label,
        value: totalCount > 0 ? Math.round((count / totalCount) * 100) : 0,
        count,
        color: colors[i],
        platforms: PLATFORM_DEFS.find(p => p.key === platformKey)?.name || '',
      }));
    }

    // ─── Second-tab data extraction per platform per country ───
    function extractSecondTabData(platformKey, country, fashionData, generalData) {
      if (platformKey === 'youtube') {
        return extractViewsForCountry(country, fashionData, generalData);
      } else if (platformKey === 'google_trends') {
        return extractGoogleTrendsInterest(country, fashionData, generalData);
      } else if (platformKey === 'x_twitter') {
        return extractXTwitterTopics(country, fashionData, generalData);
      } else if (platformKey === 'naver') {
        if (country !== 'KR') return [];
        return extractNaverRankings(fashionData, generalData);
      } else if (platformKey === 'pinterest') {
        return extractPinterestPredictions(fashionData, generalData);
      }
      return [];
    }

    function extractViewsForCountry(country, fashionData, generalData) {
      const groups = {};
      const cc = COUNTRY_YT_KEY[country];
      const processYT = (ytData) => {
        if (!ytData?.regions) return;
        // Use both trending and search for views
        for (const suffix of ['_search']) {
          const regionKey = `${cc}${suffix}`;
          const videos = ytData.regions[regionKey];
          if (!Array.isArray(videos)) continue;
          for (const video of videos) {
            const views = video.views || 0;
            if (views === 0) continue;
            const hashtags = (video.title || '').match(/#[^\s#]+/g) || [];
            let keyword = hashtags[0]?.toLowerCase();
            if (!keyword) {
              const words = (video.title || '').split(/\s+/).slice(0, 2).join(' ');
              keyword = words.length > 1 ? words : video.channel || 'other';
            }
            if (keyword.length > 20) keyword = keyword.substring(0, 20);
            if (!groups[keyword]) groups[keyword] = { views: 0, videos: 0 };
            groups[keyword].views += views;
            groups[keyword].videos += 1;
          }
        }
      };
      processYT(fashionData?.youtube);
      processYT(generalData?.youtube);

      const sorted = Object.entries(groups).sort((a, b) => b[1].views - a[1].views).slice(0, 7);
      const topKeys = new Set(sorted.map(([k]) => k));
      let otherViews = 0, otherVideos = 0;
      for (const [k, v] of Object.entries(groups)) {
        if (!topKeys.has(k)) { otherViews += v.views; otherVideos += v.videos; }
      }
      const totalViews = sorted.reduce((s, [, v]) => s + v.views, 0) + otherViews;
      const colors = ['#007AFF', '#34C759', '#FF4D40', '#FFD60A', '#FF9500', '#AF52DE', '#5AC8FA', '#636366'];
      const formatViews = (v) => {
        if (v >= 1000000) return `${(v / 1000000).toFixed(1)}M`;
        if (v >= 1000) return `${(v / 1000).toFixed(0)}K`;
        return String(v);
      };

      const result = sorted.map(([label, data], i) => ({
        label, views: data.views, viewsStr: formatViews(data.views),
        pct: totalViews > 0 ? Math.round((data.views / totalViews) * 1000) / 10 : 0,
        videos: data.videos, color: colors[i],
      }));
      if (otherViews > 0) {
        result.push({
          label: '기타', views: otherViews, viewsStr: formatViews(otherViews),
          pct: totalViews > 0 ? Math.round((otherViews / totalViews) * 1000) / 10 : 0,
          videos: otherVideos, color: colors[7],
        });
      }
      return result;
    }

    function extractGoogleTrendsInterest(country, fashionData, generalData) {
      const items = [];
      const cc = COUNTRY_GT_KEY[country];
      const collectGT = (gtData) => {
        if (!gtData?.countries?.[cc]) return;
        const countryData = gtData.countries[cc];
        const trends = countryData.all_trending || countryData.trending_fashion || [];
        for (const t of trends) {
          if (t.keyword) {
            items.push({ keyword: t.keyword, traffic: t.traffic || '', rank: t.rank || 0, news: t.related_news || [] });
          }
        }
      };
      collectGT(fashionData?.googleTrends);
      collectGT(generalData?.googleTrends);
      // Deduplicate by keyword, keep highest rank
      const seen = {};
      for (const item of items) {
        const k = item.keyword.toLowerCase();
        if (!seen[k] || item.rank < seen[k].rank) seen[k] = item;
      }
      return Object.values(seen).sort((a, b) => a.rank - b.rank).slice(0, 10);
    }

    function extractXTwitterTopics(country, fashionData, generalData) {
      const items = [];
      const xtKey = COUNTRY_XT_KEY[country];
      const collectXT = (xtData) => {
        if (!xtData?.countries?.[xtKey]) return;
        const countryData = xtData.countries[xtKey];
        const topics = countryData.all_trending || countryData.fashion_related || [];
        for (const t of topics) {
          if (t.topic) items.push({ topic: t.topic, volume: t.volume || '', rank: t.rank || 0 });
        }
      };
      collectXT(fashionData?.xTwitter);
      collectXT(generalData?.xTwitter);
      const seen = {};
      for (const item of items) {
        if (!seen[item.topic] || item.rank < seen[item.topic].rank) seen[item.topic] = item;
      }
      return Object.values(seen).sort((a, b) => a.rank - b.rank).slice(0, 15);
    }

    function extractNaverRankings(fashionData, generalData) {
      const items = [];
      const collectNaver = (naverData) => {
        if (!naverData?.daily_rankings) return;
        // Use last day's rankings
        const lastDay = naverData.daily_rankings[naverData.daily_rankings.length - 1];
        if (lastDay?.keywords) {
          for (const kw of lastDay.keywords) {
            items.push({ keyword: kw.keyword, rank: kw.rank });
          }
        }
      };
      collectNaver(fashionData?.naver);
      collectNaver(generalData?.naver);
      const seen = {};
      for (const item of items) {
        if (!seen[item.keyword] || item.rank < seen[item.keyword].rank) seen[item.keyword] = item;
      }
      return Object.values(seen).sort((a, b) => a.rank - b.rank).slice(0, 10);
    }

    function extractPinterestPredictions(fashionData, generalData) {
      const items = [];
      const collectPinterest = (pData) => {
        if (!pData?.trends) return;
        for (const t of pData.trends) {
          items.push({ name: t.name, description: t.description || '' });
        }
      };
      collectPinterest(fashionData?.pinterest);
      collectPinterest(generalData?.pinterest);
      // Deduplicate by name
      const seen = {};
      for (const item of items) {
        if (!seen[item.name]) seen[item.name] = item;
      }
      return Object.values(seen).slice(0, 12);
    }

    function buildHistory(metaResults) {
      const recent = metaResults.slice(0, 7).reverse();
      return recent.map(({ date, fashionMeta, generalMeta }) => {
        const fResults = fashionMeta?.results || {};
        const gResults = generalMeta?.results || {};
        let success = 0, fail = 0;

        for (const plat of ['youtube', 'google_trends', 'x_twitter', 'naver', 'pinterest']) {
          if (fResults[plat]?.status === 'success') success++; else if (fResults[plat]) fail++;
          if (gResults[plat]?.status === 'success') success++; else if (gResults[plat]) fail++;
        }

        const parts = date.split('-');
        const shortDate = `${parseInt(parts[1])}/${parseInt(parts[2])}`;
        return { date: shortDate, success, fail };
      });
    }

    function buildPlatformRates(metaResults) {
      return PLATFORM_DEFS.map(def => {
        let total = 0, successes = 0;
        for (const { fashionMeta, generalMeta } of metaResults) {
          if (fashionMeta?.results?.[def.key]) {
            total++;
            if (fashionMeta.results[def.key].status === 'success') successes++;
          }
          if (generalMeta?.results?.[def.key]) {
            total++;
            if (generalMeta.results[def.key].status === 'success') successes++;
          }
        }
        const rate = total > 0 ? Math.round((successes / total) * 100) : 0;
        const color = rate >= 95 ? '#34C759' : rate >= 85 ? '#FFD60A' : '#FF9500';
        return { name: def.name, rate, color };
      });
    }

    function buildMonitoringStats(metaResults, latestMeta) {
      let totalCollections = 0, totalSuccess = 0;
      for (const { fashionMeta, generalMeta } of metaResults) {
        for (const plat of ['youtube', 'google_trends', 'x_twitter', 'naver', 'pinterest']) {
          if (fashionMeta?.results?.[plat]) {
            totalCollections++;
            if (fashionMeta.results[plat].status === 'success') totalSuccess++;
          }
          if (generalMeta?.results?.[plat]) {
            totalCollections++;
            if (generalMeta.results[plat].status === 'success') totalSuccess++;
          }
        }
      }

      const errors = totalCollections - totalSuccess;
      const rate = totalCollections > 0 ? ((totalSuccess / totalCollections) * 100).toFixed(1) : '0.0';

      const timestamp = latestMeta?.run_timestamp || '';
      let lastTime = '--:--', lastDate = '--';
      if (timestamp) {
        const d = new Date(timestamp);
        const kstHour = d.getUTCHours() + 9;
        const hour = kstHour >= 24 ? kstHour - 24 : kstHour;
        const mins = d.getUTCMinutes();
        lastTime = formatTimeAMPM(hour, mins);
        const kstDate = new Date(d.getTime() + 9 * 60 * 60 * 1000);
        lastDate = kstDate.toISOString().split('T')[0] + ' KST';
      }

      return { totalCollections, totalSuccess, rate, errors, lastTime, lastDate };
    }

    function buildErrors(metaResults) {
      const errors = [];
      for (const { date, fashionMeta, generalMeta } of metaResults) {
        for (const plat of ['youtube', 'google_trends', 'x_twitter', 'naver', 'pinterest']) {
          const platNames = { youtube: 'YouTube', google_trends: 'Google Trends', x_twitter: 'X (Twitter)', naver: 'Naver', pinterest: 'Pinterest' };
          if (fashionMeta?.results?.[plat] && fashionMeta.results[plat].status !== 'success') {
            const ts = fashionMeta.run_timestamp || '';
            const timeStr = ts ? new Date(ts).toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : date;
            errors.push({ platform: platNames[plat], time: timeStr, msg: `Status: ${fashionMeta.results[plat].status} (fashion mode)` });
          }
          if (generalMeta?.results?.[plat] && generalMeta.results[plat].status !== 'success') {
            const ts = generalMeta.run_timestamp || '';
            const timeStr = ts ? new Date(ts).toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : date;
            errors.push({ platform: platNames[plat], time: timeStr, msg: `Status: ${generalMeta.results[plat].status} (general mode)` });
          }
        }
      }
      return errors.slice(0, 5);
    }

    // ─── Donut Chart ───
    function DonutChart({ data, totalLabel }) {
      const [hovered, setHovered] = useState(null);
      const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
      const total = data.reduce((s, d) => s + d.value, 0);

      const handleMouseMove = useCallback((e) => {
        setMousePos({ x: e.clientX, y: e.clientY });
      }, []);

      let cumulative = 0;
      const segments = data.map((d) => {
        const start = cumulative;
        cumulative += (d.value / total) * 360;
        return { ...d, startAngle: start, sweepAngle: (d.value / total) * 360 };
      });

      function describeArc(cx, cy, r, startAngle, sweepAngle) {
        const rad = (a) => ((a - 90) * Math.PI) / 180;
        const x1 = cx + r * Math.cos(rad(startAngle));
        const y1 = cy + r * Math.sin(rad(startAngle));
        const x2 = cx + r * Math.cos(rad(startAngle + sweepAngle));
        const y2 = cy + r * Math.sin(rad(startAngle + sweepAngle));
        const large = sweepAngle > 180 ? 1 : 0;
        return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
      }

      return (
        <div className="relative" onMouseMove={handleMouseMove} onMouseLeave={() => setHovered(null)}>
          <svg width="180" height="180" viewBox="0 0 180 180">
            {segments.map((seg, i) => (
              <path key={i} d={describeArc(90, 90, 88, seg.startAngle, seg.sweepAngle)}
                fill={seg.color} className="donut-segment"
                style={{ opacity: hovered !== null && hovered !== i ? 0.4 : 1 }}
                onMouseEnter={() => setHovered(i)}
              />
            ))}
            <circle cx="90" cy="90" r="50" className="dark:fill-navy-card fill-white transition-colors duration-500" />
            <text x="90" y="85" textAnchor="middle" className="dark:fill-white fill-gray-900" style={{ fontSize: 28, fontWeight: 700 }}>
              {data.reduce((s, d) => s + (d.count || 0), 0)}
            </text>
            <text x="90" y="105" textAnchor="middle" className="dark:fill-gray-400 fill-gray-500" style={{ fontSize: 11 }}>
              {totalLabel}
            </text>
          </svg>
          <Tooltip visible={hovered !== null} x={mousePos.x} y={mousePos.y}>
            {hovered !== null && (<>
              <div className="font-semibold text-[13px] mb-1.5">{data[hovered].label}</div>
              <div className="flex items-center gap-2 text-white/80 mb-0.5">

      );
    }

    // ─── Treemap ───
    function Treemap({ data }) {
      const [hovered, setHovered] = useState(null);
      const [mousePos, setMousePos] = useState({ x: 0, y: 0 });

      const handleMouseMove = useCallback((e) => {
        setMousePos({ x: e.clientX, y: e.clientY });
      }, []);

      function computeTreemapLayout(items) {
        const total = items.reduce((s, d) => s + d.views, 0);
        if (total === 0) return items.map(() => ({ x: 0, y: 0, w: 100, h: 100 }));
        const layouts = [];
        const topRowItems = [];
        const bottomRowItems = [];
        let topSum = 0;
        const halfTotal = total / 2;
        for (const item of items) {
          if (topSum < halfTotal && topRowItems.length < 4) {
            topRowItems.push(item);
            topSum += item.views;
          } else {
            bottomRowItems.push(item);
          }
        }
        const topPct = (topSum / total) * 100;
        const bottomPct = 100 - topPct;
        let x = 0;
        for (const item of topRowItems) {
          const w = (item.views / topSum) * 100;
          layouts.push({ x, y: 0, w, h: topPct });
          x += w;
        }
        x = 0;
        const bottomSum = total - topSum;
        for (const item of bottomRowItems) {
          const w = bottomSum > 0 ? (item.views / bottomSum) * 100 : 100 / bottomRowItems.length;
          layouts.push({ x, y: topPct, w, h: bottomPct });
          x += w;
        }
        return layouts;
      }

      const displayData = data.slice(0, 8);
      const layout = computeTreemapLayout(displayData);

      return (
        <div className="relative w-full h-[260px] rounded-lg overflow-hidden"
          onMouseMove={handleMouseMove} onMouseLeave={() => setHovered(null)}>
          {displayData.map((item, i) => (
            <div key={i}
              className="treemap-block absolute p-2.5 cursor-pointer overflow-hidden"
              style={{
                left: `${layout[i].x}%`, top: `${layout[i].y}%`,
                width: `${layout[i].w}%`, height: `${layout[i].h}%`,
                backgroundColor: item.color,
              }}
              onMouseEnter={() => setHovered(i)}
            >
              <div className="text-white font-semibold text-[12px] leading-tight">{item.label}</div>
              <div className="text-white/70 text-[10px] mt-0.5">{item.viewsStr}</div>
            </div>
          ))}
          <Tooltip visible={hovered !== null} x={mousePos.x} y={mousePos.y}>
            {hovered !== null && (<>
              <div className="font-semibold text-[13px] mb-1.5">{displayData[hovered].label}</div>
              <div className="flex items-center gap-2 text-white/80 mb-0.5">
                <Icon name="eye" size={11} color="#858A9C" /> 총 조회수: {displayData[hovered].views.toLocaleString()}
              </div>
              <div className="flex items-center gap-2 text-white/80 mb-0.5">
                <Icon name="film" size={11} color="#858A9C" /> 영상 수: {displayData[hovered].videos}개
              </div>
              <div className="flex items-center gap-2 text-white/80">
                <Icon name="percent" size={11} color="#858A9C" /> 비율: {displayData[hovered].pct}%
              </div>
            </>)}
          </Tooltip>
        </div>
      );
    }

                  <div className="flex-1" />
                  <div className="bar-animate rounded-t-md bg-green-500 w-full"
                    style={{ height: `${(d.success / maxVal) * 100}%`, animationDelay: `${i * 0.08}s` }} />
                  {d.fail > 0 && (
                    <div className="bar-animate bg-brand-red w-full"

          </div>

            <div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-sm bg-brand-red" /><span className="text-[11px] dark:text-gray-400 text-gray-500">실패</span></div>
          </div>

    function CountryTabBar({ activeCountry, onSelect }) {
      return (
        <div className="flex items-center gap-2">
          {COUNTRY_TABS.map(tab => {
            const isActive = activeCountry === tab.id;

                onClick={() => onSelect(tab.id)}

    // ─── Trend Overview Tab ───
    function TrendOverview() {
      const [chartTab, setChartTab] = useState('freq');
      const [activeCountry, setActiveCountry] = useState('KR');
      const [activePlatform, setActivePlatform] = useState('youtube');
      const data = useData();

      const platforms = data?.platforms || MOCK_PLATFORMS;
      const activePlatformDef = PLATFORM_DEFS.find(p => p.key === activePlatform);
      const secondTab = PLATFORM_SECOND_TAB[activePlatform];

      // Compute keywords and second-tab data based on selected platform + country
      const keywordsFreq = useMemo(() => {
        if (activeCountry === 'CN') return [];
        if (!data) return MOCK_KEYWORDS_FREQ;
        if (activePlatform === 'naver' && activeCountry !== 'KR') return [];
        const result = extractKeywordsForPlatform(activePlatform, activeCountry, data.fashion, data.general);
        return result.length > 0 ? result : MOCK_KEYWORDS_FREQ;
      }, [activePlatform, activeCountry, data]);

      const secondTabData = useMemo(() => {
        if (activeCountry === 'CN') return [];
        if (!data) {
          if (activePlatform === 'youtube') return MOCK_KEYWORDS_VIEWS;
          return [];
        }
        if (activePlatform === 'naver' && activeCountry !== 'KR') return [];
        return extractSecondTabData(activePlatform, activeCountry, data.fashion, data.general);
      }, [activePlatform, activeCountry, data]);

      const recentCollections = data?.recentCollections || platforms.map(p => ({ name: p.name, count: p.count, time: '9:00 AM' }));

      // Reset chartTab to 'freq' when platform changes
      useEffect(() => {
        setChartTab('freq');
      }, [activePlatform]);

      const handleCountrySelect = (countryId) => {
        setActiveCountry(countryId);
        // If switching to non-KR and naver is active, switch to youtube
        if (countryId !== 'KR' && activePlatform === 'naver') {
          setActivePlatform('youtube');
        }
      };

      const isChinaSelected = activeCountry === 'CN';
      const isNaverUnavailable = activePlatform === 'naver' && activeCountry !== 'KR';

      return (
        <div className="page-enter flex flex-col gap-5 flex-1">

          <CountryTabBar activeCountry={activeCountry} onSelect={handleCountrySelect} />

          {/* CN placeholder */}
          {isChinaSelected ? (
            <div className="flex-1 flex flex-col items-center justify-center gap-4 dark:bg-navy-card bg-white rounded-xl border dark:border-navy-border border-gray-200 p-12">
              <img src="https://flagcdn.com/w80/cn.png" alt="CN" style={{ width: 48, height: 34, borderRadius: 6, objectFit: 'cover' }} />
              <span className="text-lg font-semibold dark:text-gray-300 text-gray-600">데이터 준비 중</span>
              <span className="text-sm dark:text-gray-400 text-gray-500">중국 지역 트렌드 데이터는 곧 제공될 예정입니다</span>
            </div>
          ) : (
            <>
              {/* Platform Cards */}
              <div className="flex gap-4">
                {platforms.map((p, i) => (
                  <PlatformCard key={p.name || p.key} platform={p} index={i}
                    isActive={(p.key || PLATFORM_DEFS[i]?.key) === activePlatform}
                    onClick={() => setActivePlatform(p.key || PLATFORM_DEFS[i]?.key)} />
                ))}
              </div>

              {/* Keywords + Recent Collections */}
              <div className="flex gap-4 flex-1 min-h-0">
                <div className="flex-1 dark:bg-navy-card bg-white rounded-xl p-6
                  dark:border-navy-border border-gray-200 border flex flex-col gap-4">
                  {/* Header with platform indicator */}
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-3">
                      <span className="text-lg font-semibold dark:text-white text-gray-900">Trending Keywords</span>
                      <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-full dark:bg-navy bg-gray-100">
                        <div className="w-2 h-2 rounded-full" style={{ backgroundColor: activePlatformDef?.color || '#007AFF' }} />
                        <span className="text-[11px] font-semibold" style={{ color: activePlatformDef?.color || '#007AFF' }}>
                          {activePlatformDef?.name || 'YouTube'}
                        </span>
                      </div>
                    </div>
                    <span className="text-[11px] font-semibold text-white bg-brand-blue rounded-full px-3 py-1">
                      {data ? 'Live' : 'Mock'}
                    </span>
                  </div>

                  {/* Sub-tabs (dynamic based on platform) */}
                  <div className="flex dark:bg-navy bg-gray-100 rounded-lg p-0.5">
                    <button onClick={() => setChartTab('freq')}
                      className={`flex items-center gap-1.5 px-4 py-1.5 rounded-lg text-xs font-medium transition-all duration-300 ease-smooth
                        ${chartTab === 'freq' ? 'bg-brand-blue text-white shadow-md' : 'dark:text-gray-400 text-gray-500'}`}>
                      <Icon name="hash" size={13} color={chartTab === 'freq' ? '#fff' : '#858A9C'} /> 키워드 빈도
                    </button>
                    <button onClick={() => setChartTab('secondary')}
                      className={`flex items-center gap-1.5 px-4 py-1.5 rounded-lg text-xs font-medium transition-all duration-300 ease-smooth
                        ${chartTab === 'secondary' ? 'bg-brand-blue text-white shadow-md' : 'dark:text-gray-400 text-gray-500'}`}>
                      <Icon name={secondTab.icon} size={13} color={chartTab === 'secondary' ? '#fff' : '#858A9C'} /> {secondTab.label}
                    </button>
                  </div>

                  {/* Chart content */}
                  <div className="flex-1 flex items-center">
                    {isNaverUnavailable ? (
                      <div className="flex items-center justify-center w-full h-[200px] text-sm dark:text-gray-400 text-gray-500">
                        Naver 데이터는 한국(KR)에서만 이용 가능합니다
                      </div>
                    ) : chartTab === 'freq' ? (
                      keywordsFreq.length > 0 ? (
                        <div className="page-enter flex items-center gap-8 w-full" key={`freq-${activePlatform}-${activeCountry}`}>
                          <DonutChart data={keywordsFreq} totalLabel="total" />
                          <div className="flex-1 flex flex-col gap-3.5">
                            {keywordsFreq.map((kw, i) => (
                              <div key={i} className="flex items-center gap-2.5">
                                <div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ backgroundColor: kw.color }} />
                                <span className="flex-1 text-[13px] dark:text-white text-gray-900">{kw.label}</span>
                                <span className="text-[13px] font-semibold dark:text-gray-300 text-gray-600">{kw.value}%</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      ) : (
                        <div className="flex items-center justify-center w-full h-[200px] text-sm dark:text-gray-400 text-gray-500">
                          데이터가 없습니다
                        </div>
                      )
                    ) : (
                      <div className="page-enter w-full" key={`secondary-${activePlatform}-${activeCountry}`}>
                        {activePlatform === 'youtube' && secondTabData.length > 0 ? (
                          <Treemap data={secondTabData} />
                        ) : activePlatform === 'google_trends' ? (
                          <RankedList items={secondTabData} type="google_trends" />
                        ) : activePlatform === 'x_twitter' ? (
                          <RankedList items={secondTabData} type="x_twitter" />
                        ) : activePlatform === 'naver' ? (
                          <RankedList items={secondTabData} type="naver" />
                        ) : activePlatform === 'pinterest' ? (
                          <RankedList items={secondTabData} type="pinterest" />
                        ) : activePlatform === 'youtube' && secondTabData.length === 0 ? (
                          <div className="flex items-center justify-center w-full h-[200px] text-sm dark:text-gray-400 text-gray-500">
                            데이터가 없습니다
                          </div>
                        ) : null}
                      </div>
                    )}
                  </div>
                </div>

                {/* Recent Collections sidebar */}
                <div className="w-[340px] dark:bg-navy-card bg-white rounded-xl p-6
                  dark:border-navy-border border-gray-200 border flex flex-col gap-4">
                  <div className="flex items-center justify-between">
                    <span className="text-lg font-semibold dark:text-white text-gray-900">Recent Collections</span>
                    {data && (
                      <span className="text-[11px] dark:text-gray-400 text-gray-500">{data.latestDate}</span>
                    )}
                  </div>
                  <div className="flex dark:border-b-navy-border border-b-gray-200 border-b pb-2">
                    <span className="flex-1 text-xs font-semibold dark:text-gray-400 text-gray-500">Platform</span>
                    <span className="w-14 text-xs font-semibold dark:text-gray-400 text-gray-500">Items</span>
                    <span className="w-20 text-xs font-semibold dark:text-gray-400 text-gray-500 text-right">Time</span>
                  </div>
                  {recentCollections.map((p, i) => (
                    <div key={i} className="flex items-center py-1">
                      <span className="flex-1 text-[13px] dark:text-white text-gray-900">{p.name}</span>
                      <span className="w-14 text-[13px] font-semibold text-brand-blue">{p.count}</span>
                      <span className="w-20 text-[13px] dark:text-gray-400 text-gray-500 text-right">{p.time}</span>
                    </div>
                  ))}
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    // ─── Monitoring Tab ───
    function Monitoring() {
      const data = useData();

      const monStats = data?.monitoringStats;
      const history = data?.history?.length > 0 ? data.history : MOCK_HISTORY;
      const platformRates = data?.platformRates || [
        { name: 'YouTube', rate: 100, color: '#34C759' },
        { name: 'Google Trends', rate: 98, color: '#34C759' },
        { name: 'X (Twitter)', rate: 95, color: '#34C759' },
        { name: 'Naver', rate: 92, color: '#FFD60A' },
        { name: 'Pinterest', rate: 88, color: '#FF9500' },
      ];
      const errors = data?.errors || [
        { platform: 'Pinterest', time: '3/14 09:01', msg: 'HTTP 429: Rate limit exceeded' },
        { platform: 'Naver', time: '3/12 23:02', msg: 'Timeout: Connection timed out (15s)' },
      ];

      const stats = [
        {
          icon: 'refresh-cw', label: '총 수집 횟수',
          value: monStats ? String(monStats.totalCollections) : '348',
          sub: monStats ? `${data.metaResults.length}일간 데이터` : '최근 30일',
          color: 'dark:text-white text-gray-900', iconColor: '#858A9C',
        },
        {
          icon: 'check-circle', label: '성공률',
          value: monStats ? `${monStats.rate}%` : '96.8%',
          sub: monStats ? `${monStats.totalSuccess} / ${monStats.totalCollections} 성공` : '337 / 348 성공',
          color: 'text-green-500', iconColor: '#34C759',
        },
        {
          icon: 'clock', label: '마지막 수집',
          value: monStats ? monStats.lastTime : '9:02 AM',
          sub: monStats ? monStats.lastDate : '2026-03-17 KST',
          color: 'dark:text-white text-gray-900', iconColor: '#858A9C',
        },
        {
          icon: 'alert-triangle', label: '에러 발생',
          value: monStats ? String(monStats.errors) : '11',
          sub: monStats ? `${data.metaResults.length}일간 데이터` : '최근 30일',
          color: 'text-orange-500', iconColor: '#FF9500',
        },
      ];

      return (
        <div className="page-enter flex flex-col gap-6 flex-1">
          <div className="flex gap-4">
            {stats.map((s, i) => (
              <div key={i} className="card-enter flex-1 dark:bg-navy-card bg-white rounded-xl p-5
                dark:border-navy-border border-gray-200 border"
                style={{ animationDelay: `${i * 0.08}s` }}>
                <div className="flex items-center gap-2 mb-2">
                  <Icon name={s.icon} size={16} color={s.iconColor} />
                  <span className="text-xs dark:text-gray-400 text-gray-500">{s.label}</span>
                </div>
                <div className={`text-[28px] font-bold leading-none ${s.color}`}>{s.value}</div>
                <div className="text-[11px] dark:text-gray-400 text-gray-500 mt-1">{s.sub}</div>
              </div>
            ))}
          </div>
          <div className="flex gap-4 flex-1 min-h-0">
            <div className="flex-1 dark:bg-navy-card bg-white rounded-xl p-6
              dark:border-navy-border border-gray-200 border flex flex-col gap-4">
              <div className="flex items-center justify-between">
                <span className="text-base font-semibold dark:text-white text-gray-900">
                  수집 히스토리 ({history.length}일)
                </span>
                <span className={`text-[11px] font-semibold rounded-full px-3 py-1 ${
                  (monStats?.errors || 0) === 0
                    ? 'text-green-500 bg-green-500/10'
                    : 'text-orange-500 bg-orange-500/10'
                }`}>
                  {(monStats?.errors || 0) === 0 ? '정상' : `에러 ${monStats?.errors || 0}건`}
                </span>
              </div>
              <BarChart data={history} />
            </div>
            <div className="w-[380px] dark:bg-navy-card bg-white rounded-xl p-5
              dark:border-navy-border border-gray-200 border flex flex-col gap-3 overflow-auto">
              <span className="text-base font-semibold dark:text-white text-gray-900">플랫폼별 성공률</span>
              <div className="dark:border-b-navy-border border-b-gray-200 border-b" />
              {platformRates.map((p, i) => (
                <div key={i} className="flex flex-col gap-1.5">
                  <div className="flex justify-between">
                    <span className="text-[13px] dark:text-white text-gray-900">{p.name}</span>
                    <span className="text-[13px] font-semibold" style={{ color: p.color }}>{p.rate}%</span>
                  </div>
                  <div className="w-full h-1.5 rounded-full dark:bg-navy-border bg-gray-200">
                    <div className="progress-fill h-full rounded-full" style={{ width: `${p.rate}%`, backgroundColor: p.color }} />
                  </div>
                </div>
              ))}
              <div className="dark:border-b-navy-border border-b-gray-200 border-b mt-1" />
              <span className="text-sm font-semibold dark:text-white text-gray-900">최근 에러</span>
              {errors.length === 0 ? (
                <div className="flex items-center gap-2 rounded-lg bg-green-500/10 p-2.5">
                  <Icon name="check-circle" size={14} color="#34C759" />
                  <span className="text-[12px] text-green-500 font-medium">에러 없음 - 모든 수집 정상</span>
                </div>
              ) : (
                errors.map((err, i) => (
                  <div key={i} className="flex flex-col gap-1 rounded-lg bg-red-500/10 p-2.5">
                    <div className="flex justify-between">

                      <span className="text-[11px] dark:text-gray-400 text-gray-500">{err.time}</span>

                    <span className="text-[11px] dark:text-gray-300 text-gray-600">{err.msg}</span>
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─── App ───
    function App() {
      const [isDark, setIsDark] = useState(true);
      const [activeTab, setActiveTab] = useState('trend');
      const [dashData, setDashData] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        document.documentElement.classList.toggle('dark', isDark);
      }, [isDark]);

      useEffect(() => {
        let cancelled = false;
        setLoading(true);

        loadAllData().then(result => {
          if (cancelled) return;

          if (result) {
            const platforms = buildPlatforms(result.latestFashionMeta, result.latestGeneralMeta);
            const recentCollections = buildRecentCollections(result.latestFashionMeta, result.latestGeneralMeta);
            const history = buildHistory(result.metaResults);
            const platformRates = buildPlatformRates(result.metaResults);
            const monitoringStats = buildMonitoringStats(result.metaResults, result.latestFashionMeta);
            const errors = buildErrors(result.metaResults);

            setDashData({
              latestDate: result.latestDate,
              metaResults: result.metaResults,
              platforms,
              recentCollections,
              fashion: result.fashion,
              general: result.general,
              history,
              platformRates,
              monitoringStats,
              errors,
            });
          }
          setLoading(false);
        }).catch(err => {
          console.error('Failed to load data:', err);
          if (!cancelled) setLoading(false);
        });

        return () => { cancelled = true; };
      }, []);

      const tabs = [
        { id: 'trend', label: '트렌드 현황', icon: 'trending-up' },
        { id: 'monitor', label: '수집 모니터링', icon: 'activity' },
      ];

      const today = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
      const platformCount = dashData?.platforms?.length || 5;

      return (
        <DataContext.Provider value={dashData}>
          <div className="flex h-screen dark:bg-navy bg-gray-50 font-inter overflow-hidden max-w-[1440px] mx-auto">
            {/* Sidebar */}
            <div className="w-60 flex-shrink-0 dark:bg-navy-dark bg-white flex flex-col
              dark:border-r-navy-border border-r-gray-200 border-r p-5 gap-2">
              <div className="flex items-center gap-2.5 pb-4">
                <div className="w-8 h-8 rounded-lg bg-brand-red flex items-center justify-center">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/>
                  </svg>
                </div>
                <span className="text-lg font-bold dark:text-white text-gray-900 tracking-tight">AIMEYES</span>
              </div>
              <div className="h-px dark:bg-navy-border bg-gray-200" />
              <div className="mt-2 flex flex-col gap-1">
                <span className="text-[11px] font-semibold dark:text-gray-400 text-gray-500 tracking-wider px-3 mb-1">MENU</span>
                {tabs.map(tab => (
                  <button key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`nav-item flex items-center gap-2.5 px-3 py-2.5 rounded-lg w-full text-left text-sm
                      ${activeTab === tab.id
                        ? 'bg-brand-blue text-white font-medium'
                        : 'dark:text-gray-300 text-gray-600 dark:hover:bg-navy-card hover:bg-gray-100'}`}>
                    <Icon name={tab.icon} size={18} color={activeTab === tab.id ? '#fff' : '#858A9C'} />
                    {tab.label}
                  </button>
                ))}
              </div>
              {/* Data source indicator */}
              <div className="mt-auto pt-4">
                <div className="h-px dark:bg-navy-border bg-gray-200 mb-3" />
                <div className="flex items-center gap-2 px-3">
                  <div className={`w-2 h-2 rounded-full ${dashData ? 'bg-green-500' : loading ? 'bg-yellow-500' : 'bg-gray-400'}`} />
                  <span className="text-[11px] dark:text-gray-400 text-gray-500">
                    {dashData ? `Live Data (${dashData.latestDate})` : loading ? 'Loading...' : 'Mock Data'}
                  </span>
                </div>
              </div>
            </div>

            {/* Main Content */}
            <div className="flex-1 flex flex-col p-8 overflow-auto min-w-0">
              <div className="flex items-center justify-between mb-6">
                <div>
                  <h1 className="text-[28px] font-bold dark:text-white text-gray-900 tracking-tight">
                    {activeTab === 'trend' ? '트렌드 현황' : '수집 모니터링'}
                  </h1>
                  <p className="text-[13px] dark:text-gray-400 text-gray-500 mt-1">
                    {activeTab === 'trend'
                      ? `${today} 기준 · ${platformCount}개 플랫폼 수집 중`
                      : 'GitHub Actions · 하루 2회 자동 수집 (09:00 / 23:00 KST)'}
                  </p>
                </div>
                <ToggleSwitch isDark={isDark} onToggle={() => setIsDark(!isDark)} />
              </div>
              {loading
                ? <LoadingSpinner message="데이터를 불러오는 중..." />
                : activeTab === 'trend'
                  ? <TrendOverview key="trend" />
                  : <Monitoring key="monitor" />
              }
            </div>
          </div>
        </DataContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
