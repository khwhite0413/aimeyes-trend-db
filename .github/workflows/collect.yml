name: Daily Trend Collection

on:
  schedule:
    # 매일 00:00 UTC (한국 09:00) + 14:00 UTC (한국 23:00)
    - cron: '0 0 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect trend data (fashion + general)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TIKTOK_RAPIDAPI_KEY: ${{ secrets.TIKTOK_RAPIDAPI_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python collect_all.py

      - name: Cleanup old data (90+ days)
        run: python cleanup.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ digest/
          git diff --staged --quiet || git commit -m "data: $(date -u +%Y-%m-%d) trend collection + analysis"
          git pull --rebase || true
          git push
